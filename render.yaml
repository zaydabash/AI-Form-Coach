# Render Blueprint. One service: the Docker image serves the React app and the
# coach API together. Deploy: push to GitHub, then render.com -> New ->
# Blueprint -> pick this repo, set the env vars, deploy. You get a single URL.
services:
  - type: web
    name: formiq
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: FORMIQ_REP_MODEL
        sync: false
      - key: FORMIQ_SUMMARY_MODEL
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: FORMIQ_ACCESS_CODE
        sync: false
      - key: FORMIQ_RATE_LIMIT_PER_MIN
        value: "40"
